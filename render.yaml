services:
  - type: web
    name: what-is-this-model-service
    runtime: docker
    rootDir: model-service
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: CLASSIFIER_TOP_K
        value: "5"
      - key: ONNX_THREADS
        value: "1"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: VISION_BACKEND_TOKEN
        generateValue: true
